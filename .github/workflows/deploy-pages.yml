name: Test and deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install puzzle exporter
        run: |
          pip install "ortools>=9.12,<10"
          pip install -e . --no-deps
      - name: Regenerate safe web puzzle data
        run: python scripts/export_web_puzzles.py
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Unit and puzzle verification tests
        working-directory: web
        run: |
          npm test
          npm run verify:puzzles
      - name: Install browser
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Browser tests and production build
        working-directory: web
        run: |
          npm run test:e2e
          npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
